<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
    <style>

        p{
            position: absolute;
            display: none;
        }

      .circular {
        width: 513px;
        background-color: #444;
      }
      .texto {
        width: 400px;
      }
      .text img {
        margin-right: 10px;
      }
      .cidade {
        width: 513px;
        height: 342px;
        background-image: url("http://files.cod3r.com.br/curso-web/imagem1.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 200%;
      }
    </style>
  </head>
  <body>
    <div>
      <p class="cidade">
        <img src="http://files.cod3r.com.br/curso-web/imagem1.jpg" alt="Muro da cidade"
        width="513" height="342"
        title="muro da cidade por tarso bessa">
      </p>

      <p>
        <img src="http://files.cod3r.com.br/curso-web/imagem2.jpg"
        alt="intro do coder"
        height="342"
      </p>

      <p class="circular">
        <img src="http://files.cod3r.com.br/curso-web/imagem3.jpg"
        alt="rio de janeiro" height="342">
      </p>


      <p class="texto">
        <img src="http://files.cod3r.com.br/curso-web/avatar.jpg" alt="avatar" height="50" align="left">
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
         Nam corrupti rerum id itaque at tenetur iusto consectetur libero ut aspernatur. Praesentium omnis magnam accusamus illum nobis fugit veritatis quam facilis.
      </p>

      <p class="cidade"></p>

      <script>
        function mover(elem,inicio, fim, passo, callback){
            const novoinicio = inicio - passo;
            if (novoinicio >= fim){
                elem.style = novoinicio + 'px';
                setTimeout(() => mover(elem, novoinicio, fim, passo, callback),7)
            }
            else{
                callback();
            }
        }
        function slider(){
            const elementos = document.querySelectorAll('[wm-slider] > p')
            const slides = Array.from(elementos)

            exibirSlides(slides, slides[0]);
        }
        function exibirSlides(slides, slide){
                slide.style.display = 'block'

                const inicio = slide.innerWidth;
                const fim = slide.clientWidth;

                slide.style.left = '${inicio}px';

                mover(slide, inicio, fim, 5, () => {
                    slide.style.display = 'none';
                    exibirSlides(slide, getProximo(slides, slide))
                }) 
        }
        function getProximo(lista, atual){
            const i = lista.indexOf(atual) + 1;
            return i < lista.length ? lista[1] : lista[0]
        }

        const p = document.querySelector('[wm-slider] > p')
        p.style.display = 'block'
        mover(p, 1500, -520, 5, () => {
            console('!!!!')
        })
      </script>

    </div>
  </body>
</html>
