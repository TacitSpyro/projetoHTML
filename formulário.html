<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 100px;
            padding: 100px;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container{
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }

        h1{
            text-align: center;
            color: #00bcd4;
            margin-bottom: 30px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        .form-group{
            margin-bottom: 20px;
        }
        label{
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        input,
        textarea,
        select,
        button{
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #f0f8ff;
        }

        input[type="radio"],
        input[type="checkbox"]{
            display: inline-block;
            width: auto;
            margin-right: 10px;
        }
        button{
            background-color: #00bcd4;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover{
            background-color: #0097a7;
        }

        select,
        textarea{
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus{
            border-color: #00bcd4;
            outline: none;
        }

        fieldset{
            border: none;
            padding: 0;
        }

        legend{
            font-weight: bold;
            margin-bottom: 10px;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
    </Style>
</head>
<body>
    <div class="form-container">
        <h1>Formulario</h1>

        <form method="POST" action="http://localhost/:3003/usuarios">
            <input type="hidden" name="id" value="3">
            <div>
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Digire a sua senha">
            </div>
            <div class="form-group">
                <label for="senha">senha</label>
                <input type="text" name="senha" id="senha" placeholder="Digite a sua senha">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea name="bio" id="bio" cols="30" rows="10" placeholder="Conte um pouco sobre você"></textarea>
            </div>
            <fieldset class="form-group">
                <legend>Tipo de usuario</legend>
                <label for="admin">
                    <input type="radio" name="Tipo" id="admin" value="admin">admin
                </label>
                <label for="regular">
                    <input type="radio" name="regular" id="regular" value="regular">regular
                </label>
                <label for="professor">
                    <input type="radio" name="Tipo" id="professor" value="professor">Professor
                </label>
            </fieldset>
            <div class="form-group">
                <label for="ativo">
                    <input type="checkbox" name="ativo" id="ativo">Ativo
                </label>
            </div>
            <div>
                <label for="estado">Estado</label>
                <select name="estado" id="id">
                    <option value="">Selecione</option>
                    <option value="ac">Acre</option>
                    <option value="ba">Bahia</option>
                    <option value="ce">Ceará</option>
                    <option value="df">Distrito Federal</option>
                    <option value="mg">Minas Gerais</option>
                    <option value="pa">Pará</option>
                    <option value="pr">Paraná</option>
                    <option value="pa">Rio Grande do Sul</option>
                    <option value="sc">Santa Catarina</option>
                    <option value="sp">São Paulo</option>
                </select>
            </div>
            <div class="form-group">
                <label for="interesses" >Interesses</label>
                <select name="interesses" id="interesses" multiple-size="7">
                    <option value="js">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="php">PHP</option>
                    <option value="python">python</option>
                    <option value="go">GO</option>
                    <option value="c">C</option>
                </select>
            </div>
            <div class="form-group button">
                <button type="submit">Incluir</button>
                <button formaction="http://localhost:3003/usuarios/3" type="submit">Alterar</button>
            </div>
        </form>
    </div>
</body>
</html>
